        function updateDateFilterUI() {
            document.querySelectorAll('.date-mode-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === activeDateMode));
            const container = document.getElementById('dateInputsContainer');
            let html = '';
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            
            if (activeDateMode === 'all') { html = `<span style="color: var(--text-secondary); font-size: 0.9rem; padding: 0 10px;">모든 데이터 표시</span>`;
            } else if (activeDateMode === 'year') { html = `<input type="number" id="dateInput" value="${year}" onchange="applyFilters()">`;
            } else if (activeDateMode === 'month') { html = `<button class="date-nav-btn" onclick="navigateDate(-1)">&lt;</button><input type="month" id="dateInput" value="${year}-${month}" onchange="applyFilters()"><button class="date-nav-btn" onclick="navigateDate(1)">&gt;</button>`;
            } else if (activeDateMode === 'day') { html = `<button class="date-nav-btn" onclick="navigateDate(-1)">&lt;</button><input type="date" id="dateInput" value="${year}-${month}-${day}" onchange="applyFilters()"><button class="date-nav-btn" onclick="navigateDate(1)">&gt;</button>`;
            } else if (activeDateMode === 'range') { html = `<input type="date" id="startDateInput" onchange="applyFilters()"><span style="margin: 0 5px;">-</span><input type="date" id="endDateInput" onchange="applyFilters()">`; }
            container.innerHTML = html;
        }

        function navigateDate(direction) {
            const input = document.getElementById('dateInput');
            if (!input) return;
            if (activeDateMode === 'year') { input.value = Number(input.value) + direction;
            } else {
                let currentDate = (activeDateMode === 'month') ? new Date(input.value + '-02') : new Date(input.value);
                if(activeDateMode === 'month') currentDate.setMonth(currentDate.getMonth() + direction);
                else if (activeDateMode === 'day') currentDate.setDate(currentDate.getDate() + direction);
                input.value = currentDate.toISOString().slice(0, activeDateMode === 'month' ? 7 : 10);
            }
            applyFilters();
        }
        
        function toggleColumnDropdown() {
            const dropdown = document.getElementById('columnToggleDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }
        
        function handleColumnToggle(event, columnName) {
            visibleColumns[columnName] = event.target.checked;
            applyFilters();
        }
        
        function setupColumnToggles() {
            const dropdown = document.getElementById('columnToggleDropdown');
            dropdown.innerHTML = '';
            currentHeaders.forEach(header => {
                const item = document.createElement('div');
                item.className = 'column-toggle-item';
                item.innerHTML = `<input type="checkbox" id="toggle-${header}" ${visibleColumns[header] ? 'checked' : ''} onchange="handleColumnToggle(event, '${header}')"><label for="toggle-${header}">${header}</label>`;
                dropdown.appendChild(item);
            });
        }
        
        function generateVisibleColumns(headers) {
            visibleColumns = {};
            headers.forEach(header => {
                visibleColumns[header] = !DEFAULT_HIDDEN_COLUMNS.includes(header);
            });
        }
        
        function buildModalForm(data = null, isReadOnly = false) {
            const form = document.getElementById('applicantForm');
            form.innerHTML = '';
            
            const requiredFields = ['이름', '연락처', '지원루트', '모집분야'];
            const dropdownOptions = {
                '지원루트': ['사람인', '잡코리아', '인크루트', '아웃바운드', '배우공고', '당근', 'Instagram', 'Threads', '직접입력'],
                '모집분야': ['영업', '강사', '상조', '직접입력'], '성별': ['남자', '여자'],
                '증원자': ['회사', '이성진', '김영빈', '최혜진', '직접입력'],
                '1차 컨택 결과': ['부재1회', '부재2회', '보류', '거절', '파기', '면접확정'],
                '면접자': ['이성진', '김영빈', '최혜진', '직접입력'],
                '면접결과': ['미참석', '불합격', '보류', '합격']
            };
            const dateFields = ['면접 날짜', '면접 날자', '입과일'];
            const timeFields = ['면접 시간'];
            
            currentHeaders.forEach((header, index) => {
                if (header === '지원일') return;
                
                const formGroup = document.createElement('div');
                formGroup.className = `form-group ${header === '비고' || header === '면접리뷰' ? 'full-width' : ''}`;
                
                const isRequired = requiredFields.includes(header) && !isReadOnly;
                const value = data ? String(data[index] || '') : (header === '구분' ? nextSequenceNumber : '');
                
                let inputHtml = '';
                
                if (header === '연락처') {
                    inputHtml = `<input type="tel" id="modal-form-${header}" value="${value}" oninput="formatPhoneNumber(this)" ${isRequired ? 'required' : ''} ${isReadOnly ? 'disabled' : ''}>`;
                } else if (dateFields.includes(header)) {
                    inputHtml = `<input type="date" id="modal-form-${header}" value="${value}" ${isRequired ? 'required' : ''} ${isReadOnly ? 'disabled' : ''}>`;
                } else if (timeFields.includes(header)) {
                    inputHtml = `<input type="text" id="modal-form-${header}" value="${value}" placeholder="예: 14시 30분" ${isRequired ? 'required' : ''} ${isReadOnly ? 'disabled' : ''}>`;
                } else if (dropdownOptions[header]) {
                    const options = dropdownOptions[header];
                    const hasDirectInput = options.includes('직접입력');
                    let customValue = '';
                    let selectValue = value;
                    if(data && hasDirectInput && !options.includes(value)){
                       selectValue = '직접입력';
                       customValue = value;
                    }

                    inputHtml = `<select id="modal-form-${header}" onchange="${hasDirectInput ? `handleDropdownChange(this, '${header}')` : ''}" ${isRequired ? 'required' : ''} ${isReadOnly ? 'disabled' : ''}>
                                    <option value="">선택해주세요</option>
                                    ${options.map(option => `<option value="${option}" ${selectValue === option ? 'selected' : ''}>${option}</option>`).join('')}
                                </select>`;
                    if(hasDirectInput) {
                        inputHtml += `<input type="text" id="modal-form-${header}-custom" value="${customValue}" placeholder="직접 입력하세요" style="display:${selectValue === '직접입력' ? 'block' : 'none'}; margin-top:5px;" ${isReadOnly ? 'disabled' : ''}>`;
                    }
                } else if (header === '비고' || header === '면접리뷰') {
                    inputHtml = `<textarea id="modal-form-${header}" rows="3" ${isRequired ? 'required' : ''} ${isReadOnly ? 'disabled' : ''}>${value}</textarea>`;
                } else {
                    inputHtml = `<input type="text" id="modal-form-${header}" value="${value}" ${isRequired ? 'required' : ''} ${isReadOnly || (header === '구분' && isReadOnly) ? 'disabled' : ''} ${header === '구분' ? 'style="background-color: #f1f5f9;"' : ''}>`;
                }
                
                formGroup.innerHTML = `<label for="modal-form-${header}">${header}${isRequired ? ' *' : ''}</label>${inputHtml}`;
                form.appendChild(formGroup);
            });
        }

        function handleDropdownChange(selectElement, fieldName) {
            const customInput = document.getElementById(`modal-form-${fieldName}-custom`);
            const isDirectInput = selectElement.value === '직접입력';
            
            customInput.style.display = isDirectInput ? 'block' : 'none';
            if(isDirectInput) customInput.focus();

            const isRequired = document.querySelector(`label[for="modal-form-${fieldName}"]`).textContent.includes('*');
            if(isRequired){
                if(isDirectInput){
                    selectElement.removeAttribute('required');
                    customInput.setAttribute('required', '');
                } else {
                    customInput.removeAttribute('required');
                    selectElement.setAttribute('required', '');
                }
            }
        }
        
        function formatPhoneNumber(input) {
            let value = input.value.replace(/\D/g, '').slice(0, 11);
            if (value.length > 7) {
                input.value = `${value.slice(0, 3)}-${value.slice(3, 7)}-${value.slice(7)}`;
            } else if (value.length > 3) {
                input.value = `${value.slice(0, 3)}-${value.slice(3)}`;
            } else {
                input.value = value;
            }
        }

        function showInterviewDetails(name, route) {
    // 전체 데이터에서 해당 지원자 찾기
    const nameIndex = currentHeaders.indexOf('이름');
    const routeIndex = currentHeaders.indexOf('지원루트');
    
    const targetRow = allApplicantData.find(row => {
        const nameMatch = String(row[nameIndex] || '') === name;
        const routeMatch = String(row[routeIndex] || '') === route;
        return nameMatch && routeMatch;
    });
    
    if (targetRow) {
        // 기존 상세 정보 모달 열기 (읽기 전용)
        openCardDetail(targetRow);
    }
}
    </script>
</body>
