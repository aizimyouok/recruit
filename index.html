<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채용 현황 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-overlay" onclick="toggleMobileMenu()"></div>
    
    <div class="app-container">
        <nav class="sidebar" id="sidebar" role="navigation" aria-label="주 메뉴 네비게이션">
            <div class="sidebar-header">
                <div class="sidebar-title">채용 대시보드</div>
                <div class="sidebar-subtitle">Hiring Status</div>
            </div>
            <div class="nav-menu">
                <button class="nav-item active" onclick="switchPage('dashboard')" aria-label="지원자 현황 페이지로 이동"><i class="fas fa-users icon"></i> 현황</button>
                <button class="nav-item" onclick="switchPage('stats')" aria-label="통계 분석 페이지로 이동"><i class="fas fa-chart-pie icon"></i> 통계</button>
            </div>
            
            <div class="sidebar-widgets">
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">조회 기간</div>
                    <select id="sidebarPeriodFilter" onchange="handleSidebarPeriodChange()">
                        <option value="all">전체</option>
                        <option value="year">올해</option>
                        <option value="month">이번 달</option>
                        <option value="week">이번 주</option>
                        <option value="custom">기간 입력</option>
                    </select>
                    <div id="sidebarCustomDateRange" style="display: none; margin-top: 8px;">
                        <input type="date" id="sidebarStartDate">
                        <input type="date" id="sidebarEndDate">
                        <button onclick="updateSidebarWidgets()">적용</button>
                    </div>
                </div>
                
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">지원자</div>
                    <div class="sidebar-widget-value" id="sidebarTotalApplicants">0</div>
                    <div class="sidebar-widget-subtitle" id="sidebarPeriodLabel">전체 기간</div>
                </div>
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">면접 대기</div>
                    <div class="sidebar-widget-value" id="sidebarInterviewPending">0</div>
                    <div class="sidebar-widget-subtitle">1차 면접확정</div>
                </div>
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">합격률</div>
                    <div class="sidebar-widget-value" id="sidebarSuccessRate">0%</div>
                    <div class="sidebar-widget-subtitle">면접확정 대비</div>
                </div>
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">입과율</div>
                    <div class="sidebar-widget-value" id="sidebarJoinRate">0%</div>
                    <div class="sidebar-widget-subtitle">합격자 대비</div>
                </div>
            </div>
        </nav>
        
        <main class="main-content">
            <header class="main-header" role="banner" aria-label="메인 헤더 영역">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-label="모바일 메뉴 열기">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="main-title" id="pageTitle">지원자 현황</h1>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="다크모드 토글">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </header>
            
            <div class="content-area" role="main" aria-label="메인 콘텐츠 영역" id="main-content">
                <div id="dashboard" class="page active">
                    <div class="interview-schedule-card">
                        <div class="interview-schedule-header">
                            <span class="interview-schedule-title">임박한 면접 일정</span>
                            <i class="fas fa-calendar-check interview-schedule-icon"></i>
                        </div>
                        <div id="interviewScheduleList">
                            <div class="no-interviews">예정된 면접이 없습니다.</div>
                        </div>
                    </div>
                    
                    <div class="page-header">
                        <h2 class="page-title">전체 지원자 목록</h2>
                        <div class="header-actions">
                            <div class="view-toggle">
                                <button class="view-btn active" onclick="switchView('table')" aria-label="테이블 뷰로 전환"><i class="fas fa-table"></i></button>
                                <button class="view-btn" onclick="switchView('cards')" aria-label="카드 뷰로 전환"><i class="fas fa-th-large"></i></button>
                            </div>
                            <button class="secondary-btn reset-btn" onclick="resetFilters()" aria-label="모든 필터 초기화"><i class="fas fa-undo"></i> 필터 초기화</button>
                            <div class="column-toggle-container">
                                <button class="secondary-btn" onclick="toggleColumnDropdown()" aria-label="컬럼 표시 설정"><i class="fas fa-columns"></i> 컬럼 설정</button>
                                <div class="column-toggle-dropdown" id="columnToggleDropdown"></div>
                            </div>
                             <button class="primary-btn" onclick="openNewApplicantModal()" aria-label="새 지원자 등록"><i class="fas fa-plus"></i> 신규 지원자 등록</button>
                        </div>
                    </div>
                    
                    <div class="filter-bar" role="search" aria-label="지원자 필터링 도구">
                        <div class="filter-group search-input">
                            <label for="globalSearch">통합 검색</label>
                            <div style="position: relative;">
                                <i class="fas fa-search search-icon"></i>
                                <input type="text" id="globalSearch" placeholder="이름, 연락처 등 검색..." oninput="handleSearch()" aria-label="지원자 통합 검색">
                            </div>
                        </div>
                        <div class="filter-group">
                            <label for="routeFilter">지원루트</label>
                            <select id="routeFilter" onchange="applyFilters()"><option value="all">전체</option></select>
                        </div>
                        <div class="filter-group">
                            <label for="positionFilter">모집분야</label>
                            <select id="positionFilter" onchange="applyFilters()"><option value="all">전체</option></select>
                        </div>
                         <div class="filter-group">
                            <label>조회 기간</label>
                            <div class="date-filter-container">
                                <div id="dateModeToggle">
                                    <button class="date-mode-btn" data-mode="all">전체</button>
                                    <button class="date-mode-btn" data-mode="year">연</button>
                                    <button class="date-mode-btn" data-mode="month">월</button>
                                    <button class="date-mode-btn" data-mode="day">일</button>
                                    <button class="date-mode-btn" data-mode="range">기간</button>
                                </div>
                                <div id="dateInputsContainer"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="filter-summary" id="filterSummary"></div>
                    
                    <div class="content-container">
                        <div class="table-container" id="tableView"></div>
                        <div class="cards-container" id="cardsView"></div>
                        <div class="pagination-container" id="paginationContainer">
                            <div class="pagination-info" id="paginationInfo"></div>
                            <div class="pagination-controls">
                                <button class="pagination-btn" id="firstPageBtn" onclick="goToFirstPage()"><i class="fas fa-angle-double-left"></i> 처음</button>
                                <button class="pagination-btn" id="prevPageBtn" onclick="goToPrevPage()"><i class="fas fa-angle-left"></i> 이전</button>
                                <div class="pagination-numbers" id="paginationNumbers"></div>
                                <button class="pagination-btn" id="nextPageBtn" onclick="goToNextPage()">다음 <i class="fas fa-angle-right"></i></button>
                                <button class="pagination-btn" id="lastPageBtn" onclick="goToLastPage()">마지막 <i class="fas fa-angle-double-right"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="stats" class="page">
                    <div class="page-header">
                        <h2 class="page-title">채용 통계 분석</h2>
                        <div class="header-actions">
                            <select id="statsPeriodFilter" onchange="handleStatsPeriodChange()">
                                <option value="all">전체 기간</option>
                                <option value="year">올해</option>
                                <option value="month">이번 달</option>
                                <option value="week">이번 주</option>
                                <option value="custom">기간 입력</option>
                            </select>
                            <div id="statsCustomDateRange" style="display: none;">
                                <input type="date" id="statsStartDate">
                                <input type="date" id="statsEndDate">
                                <button onclick="updateStatistics()">적용</button>
                            </div>
                            <button class="secondary-btn" onclick="updateStatistics()"><i class="fas fa-sync-alt"></i> 새로고침</button>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div class="content-container stat-card-highlight"><h3 id="totalApplicantsChart">0</h3><p>지원자 수</p><small id="statsTimePeriod">전체 기간</small></div>
                        <div class="content-container stat-card-highlight"><h3 id="pendingInterviewChart">0</h3><p>면접 대기</p><small>1차 면접확정</small></div>
                        <div class="content-container stat-card-highlight"><h3 id="successRateChart">0%</h3><p>합격률</p><small>면접확정 대비</small></div>
                        <div class="content-container stat-card-highlight"><h3 id="joinRateChart">0%</h3><p>입과율</p><small>합격자 대비</small></div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="content-container" style="padding: 20px;">
                            <h3 style="margin-bottom: 20px;">지원루트별 분포</h3>
                            <canvas id="routeChart" style="max-height: 300px;"></canvas>
                        </div>
                        <div class="content-container" style="padding: 20px;">
                            <h3 style="margin-bottom: 20px;">모집분야별 분포</h3>
                            <canvas id="positionChart" style="max-height: 300px;"></canvas>
                        </div>
                    </div>
                    
                    <div class="content-container" style="padding: 25px; margin-bottom: 20px;">
                        <h3 style="margin-bottom: 20px;">효율성 분석</h3>
                        <div class="efficiency-tabs" style="margin-bottom: 20px;">
                            <button class="efficiency-tab-btn active" data-tab="route" onclick="switchEfficiencyTab('route')">지원루트별</button>
                            <button class="efficiency-tab-btn" data-tab="recruiter" onclick="switchEfficiencyTab('recruiter')">증원자별</button>
                            <button class="efficiency-tab-btn" data-tab="interviewer" onclick="switchEfficiencyTab('interviewer')">면접관별</button>
                        </div>
                        <div id="efficiencyTabContent"></div>
                    </div>
                    
                    <div class="content-container" style="padding: 25px; margin-bottom: 20px;">
                        <h3 style="margin-bottom: 20px;">지원자 추이 분석</h3>
                        <div class="trend-tabs" style="margin-bottom: 20px;">
                            <button class="trend-tab-btn active" data-period="all" onclick="switchTrendTab('all')">전체</button>
                            <button class="trend-tab-btn" data-period="year" onclick="switchTrendTab('year')">년별</button>
                            <button class="trend-tab-btn" data-period="month" onclick="switchTrendTab('month')">월별</button>
                        </div>
                        <canvas id="trendChart" style="max-height: 400px;"></canvas>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="content-container" style="padding: 20px;">
                            <h3 style="margin-bottom: 20px;">지역별 분포</h3>
                            <canvas id="regionChart" style="max-height: 300px;"></canvas>
                        </div>
                        <div class="content-container" style="padding: 20px;">
                            <h3 style="margin-bottom: 20px;">성별 분포</h3>
                            <canvas id="genderChart" style="max-height: 300px;"></canvas>
                        </div>
                        <div class="content-container" style="padding: 20px;">
                            <h3 style="margin-bottom: 20px;">연령대별 분포</h3>
                            <canvas id="ageChart" style="max-height: 300px;"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div id="applicantModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title"></h3>
                <button class="close-btn" onclick="closeModal()" aria-label="모달 닫기">&times;</button>
            </div>
            <div class="modal-body"><form id="applicantForm"></form></div>
            <div class="modal-footer"></div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
