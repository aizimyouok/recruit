<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채용 현황 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #4a5568; --sidebar-header-bg: #2d3748; --sidebar-text: #e2e8f0;
            --sidebar-accent: #818cf8; --main-bg: #f8fafc; --content-bg: #ffffff;
            --text-primary: #334155; --text-secondary: #64748b; --border-color: #e2e8f0;
            --accent-orange: #fb923c; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }

        [data-theme="dark"] {
            --sidebar-bg: #1e293b; --sidebar-header-bg: #0f172a; --sidebar-text: #f1f5f9;
            --sidebar-accent: #a78bfa; --main-bg: #0f172a; --content-bg: #1e293b;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--main-bg); color: var(--text-primary); transition: all 0.3s ease; }
        
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; position: fixed; height: 100%; transition: all 0.3s ease; z-index: 1000; overflow-y: auto; }
        .sidebar-header { padding: 25px 20px; background: var(--sidebar-header-bg); }
        .sidebar-title { font-size: 1.5rem; font-weight: 700; }
        .sidebar-subtitle { font-size: 0.85rem; color: #a0aec0; }
        .nav-menu { padding: 15px 0; }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: var(--sidebar-text); text-decoration: none; transition: all 0.2s ease; border-left: 4px solid transparent; cursor: pointer; background: none; border: none; width: 100%; text-align: left; font-size: 1rem; }
        .nav-item:hover { background: #718096; transform: translateX(2px); }
        .nav-item.active { background: #718096; border-left-color: var(--sidebar-accent); font-weight: 500;}
        .nav-item .icon { margin-right: 15px; width: 20px; text-align: center; }
        
        .main-content { flex: 1; margin-left: 260px; display: flex; flex-direction: column; transition: margin-left 0.3s ease; }
        .main-header { background: var(--content-bg); padding: 18px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .main-title { font-size: 1.7rem; font-weight: 700; }
        .theme-toggle { background: none; border: 2px solid var(--border-color); color: var(--text-primary); padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; }
        .theme-toggle:hover { background: var(--sidebar-accent); color: white; border-color: var(--sidebar-accent); }
        
        .content-area { padding: 30px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 사이드바 위젯 */
        .sidebar-widgets { padding: 20px 15px; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); }
        .sidebar-widget { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .sidebar-widget:last-child { margin-bottom: 0; }
        .sidebar-widget-title { font-size: 0.75rem; font-weight: 500; color: #a0aec0; text-transform: uppercase; margin-bottom: 8px; }
        .sidebar-widget-value { font-size: 1.5rem; font-weight: 700; color: var(--sidebar-text); }
        .sidebar-widget-subtitle { font-size: 0.7rem; color: #a0aec0; margin-top: 4px; }
        
        /* 📅 면접 일정 카드 */
        .interview-schedule-card { background: var(--content-bg); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); padding: 25px; margin-bottom: 30px; border-left: 4px solid var(--warning); overflow: hidden; }
        .interview-schedule-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .interview-schedule-title { font-size: 1.2rem; font-weight: 600; color: var(--text-primary); }
        .interview-schedule-icon { font-size: 1.5rem; color: var(--warning); }
        .no-interviews { text-align: center; color: var(--text-secondary); font-style: italic; padding: 20px 0; }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .page-title { font-size: 1.8rem; font-weight: 500; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        
        /* 🗂️ 뷰 토글 */
        .view-toggle { display: flex; background: var(--content-bg); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; }
        .view-btn { padding: 8px 12px; background: none; border: none; cursor: pointer; transition: all 0.2s ease; color: var(--text-secondary); }
        .view-btn.active { background: var(--sidebar-accent); color: white; }
        .view-btn:hover:not(.active) { background: var(--border-color); }
        
        .primary-btn, .secondary-btn { padding: 10px 20px; font-size: 0.95rem; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
        .primary-btn { background-color: var(--sidebar-accent); color: white; }
        .primary-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .secondary-btn { background-color: var(--content-bg); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .secondary-btn.reset-btn { background-color: var(--accent-orange); color: white; }
        .secondary-btn:hover { background-color: var(--border-color); transform: translateY(-1px); }
        
        /* 🔍 검색 필터 */
        .filter-bar { display: flex; gap: 15px; align-items: flex-end; padding: 20px; background: var(--content-bg); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); margin-bottom: 20px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-weight: 500; font-size: 0.9rem; margin-bottom: 5px; }
        .filter-group input, .filter-group select { height: 44px; padding: 10px 12px; font-size: 0.9rem; border: 1px solid var(--border-color); border-radius: 6px; transition: all 0.2s ease; background: var(--content-bg); color: var(--text-primary); }
        .filter-group input:focus, .filter-group select:focus { border-color: var(--sidebar-accent); outline: none; box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1); }
        .search-input { min-width: 200px; }
        .search-input input { padding-left: 40px; }
        .search-input .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }
        .search-input { position: relative; }
        
        .date-filter-container { display: flex; align-items: center; gap: 5px; height: 44px; background-color: var(--content-bg); border: 1px solid var(--border-color); padding: 5px; border-radius: 6px; }
        .date-mode-btn { padding: 8px 12px; border: none; background-color: transparent; font-weight: 500; cursor: pointer; border-radius: 4px; font-size: 0.9rem; height: 100%; transition: all 0.2s ease; }
        .date-mode-btn.active { background-color: var(--text-secondary); color: white; }
        .date-nav-btn { padding: 4px 8px; border: none; background-color: var(--sidebar-accent); color: white; border-radius: 3px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
        .date-nav-btn:hover { filter: brightness(1.1); }
        #dateInputsContainer { display: flex; align-items: center; gap: 5px; }
        #dateInputsContainer input { padding: 8px; text-align: center; height: 32px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--content-bg); color: var(--text-primary); }
        .apply-btn { height: 100%; padding: 0 15px; background-color: var(--sidebar-accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .apply-btn:hover { filter: brightness(1.1); }
        
        .filter-summary { margin-top: -10px; margin-bottom: 15px; padding-left: 5px; color: var(--text-primary); font-weight: 500; font-size: 1rem;}
        .filter-summary strong { color: var(--sidebar-accent); margin-right: 5px; }
        
        /* 📄 페이지네이션 스타일 */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--content-bg);
            border-top: 1px solid var(--border-color);
            margin-top: 20px;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
        }
        
        .pagination-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pagination-btn {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            background: var(--content-bg);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .pagination-btn:hover:not(:disabled) {
            background: var(--sidebar-accent);
            color: white;
            border-color: var(--sidebar-accent);
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination-numbers {
            display: flex;
            gap: 5px;
        }
        
        .pagination-number {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            background: var(--content-bg);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            min-width: 40px;
            text-align: center;
        }
        
        .pagination-number.active {
            background: var(--sidebar-accent);
            color: white;
            border-color: var(--sidebar-accent);
        }
        
        .pagination-number:hover:not(.active) {
            background: var(--border-color);
        }
        
        .pagination-ellipsis {
            padding: 8px 4px;
            color: var(--text-secondary);
        }
        
        /* 테이블 & 카드뷰 */
        .content-container { background-color: var(--content-bg); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); overflow: hidden; }
        .table-container { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px; border-bottom: 1px solid var(--border-color); text-align: center; white-space: nowrap; font-size: 0.95rem; }
        .data-table thead th { background-color: var(--main-bg); font-weight: 700; color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; position: sticky; top: 0; z-index: 1;}
        .data-table th.sortable-header { cursor: pointer; user-select: none; transition: background-color 0.2s ease; }
        .data-table th.sortable-header:hover { background-color: var(--border-color); }
        .data-table .sort-icon { margin-left: 8px; color: #cbd5e1; transition: color 0.2s; }
        .data-table .sort-icon.active { color: var(--sidebar-accent); }
        .data-table tbody tr:not(.detail-row) { cursor: pointer; transition: background-color 0.2s ease; }
        .data-table tbody tr:not(.detail-row):hover { background-color: var(--main-bg); }
        .data-table td a { color: var(--sidebar-accent); font-weight: 500; text-decoration: none; }
        .data-table td a:hover { text-decoration: underline; }
        
        /* 🎨 상태별 색상 코딩 - 3번 요청: '불합격'은 danger 색상으로 표시됩니다 */
        .status-합격, .status-입과, .status-출근 { background-color: var(--success) !important; color: white !important; }
        .status-불합격, .status-거절, .status-미참석 { background-color: var(--danger) !important; color: white !important; }
        .status-보류, .status-면접확정, .status-대기 { background-color: var(--warning) !important; color: white !important; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: 500; }
        
        /* 🗂️ 카드뷰 */
        .cards-container { display: none; padding: 20px; }
        .cards-container.active { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .applicant-card { background: var(--content-bg); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 20px; transition: all 0.2s ease; cursor: pointer; }
        .applicant-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-name { font-size: 1.2rem; font-weight: 600; }
        .card-sequence { background: var(--sidebar-accent); color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; }
        .card-info { margin-bottom: 10px; }
        .card-label { font-weight: 500; color: var(--text-secondary); margin-right: 8px; }
        .card-footer { border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .data-table .detail-row { display: none; }
        .data-table .detail-row.show { display: table-row; background-color: var(--main-bg); }
        .detail-content { padding: 20px; box-shadow: inset 0 4px 6px -1px rgba(0,0,0,0.05);}
        .detail-table { width: 100%; border-spacing: 0; border-collapse: collapse; }
        .detail-table td { padding: 10px; border-bottom: 1px solid var(--border-color); white-space: normal; text-align: left;}
        .detail-table tr:last-child td { border-bottom: none; }
        .detail-table strong { color: var(--text-secondary); display: inline-block; width: 100px; font-weight: 500;}
        
        .column-toggle-container { position: relative; }
        .column-toggle-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 5px; background-color: var(--content-bg); border: 1px solid var(--border-color); border-radius: var(--border-radius); box-shadow: var(--shadow-md); padding: 15px; width: 200px; z-index: 100; }
        .column-toggle-item { display: flex; align-items: center; margin-bottom: 10px; }
        .column-toggle-item:last-child { margin-bottom: 0; }
        .column-toggle-item input { margin-right: 10px; width: 16px; height: 16px; }
        .column-toggle-item label { cursor: pointer; font-size: 0.95rem; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background-color: var(--content-bg); padding: 30px; border-radius: var(--border-radius); box-shadow: 0 5px 15px rgba(0,0,0,0.3); width: 90%; max-width: 900px; animation: modalSlideIn 0.3s ease; }
        @keyframes modalSlideIn { from { opacity: 0; transform: scale(0.9) translateY(-20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-body form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.5rem; }
        .close-btn { font-size: 1.8rem; color: var(--text-secondary); cursor: pointer; background: none; border: none; transition: color 0.2s ease; }
        .close-btn:hover { color: var(--danger); }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px; font-size: 1rem; border: 1px solid var(--border-color); border-radius: 6px; background: var(--content-bg); color: var(--text-primary); transition: border-color 0.2s ease; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--sidebar-accent); outline: none; box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1); }
        .form-group.full-width { grid-column: 1 / -1; }
        .modal-footer { text-align: right; margin-top: 30px; }
        
        /* ⌨️ 키보드 단축키 힌트 */
        .keyboard-hint { position: fixed; bottom: 20px; right: 20px; background: var(--content-bg); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 10px 15px; font-size: 0.8rem; color: var(--text-secondary); opacity: 0; transition: opacity 0.3s ease; z-index: 1000; }
        .keyboard-hint.show { opacity: 1; }
        
        /* 📅 면접 일정 테이블 */
        .interview-schedule-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .interview-schedule-table th, .interview-schedule-table td { 
            padding: 8px; 
            border-bottom: 1px solid var(--border-color); 
            text-align: left; 
            font-size: 0.85rem; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 0;
        }
        
        .interview-schedule-table th { 
            background-color: var(--main-bg); 
            font-weight: 600; 
            color: var(--text-secondary); 
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .interview-schedule-table td { color: var(--text-primary); }
        .interview-name-cell { font-weight: 500; max-width: 80px; }
        .interview-route-cell { max-width: 70px; }
        .interview-recruiter-cell { max-width: 60px; }
        .interview-position-cell { max-width: 60px; }
        .interview-interviewer-cell { max-width: 60px; }
        .interview-date-cell { color: var(--warning); font-weight: 500; max-width: 120px; }
        .interview-dday { 
            background: var(--warning); 
            color: white; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            margin-right: 8px;
            display: inline-block;
        }
        .interview-dday.today { 
            background: var(--danger); 
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .interview-date-text { 
            color: var(--text-primary); 
            font-weight: 500; 
        }
        
        /* 📅 임박 면접 색상 표시 */
        .urgent-interview-0 { background-color: rgba(239, 68, 68, 0.1) !important; border-left: 4px solid var(--danger) !important; }
        .urgent-interview-1 { background-color: rgba(245, 158, 11, 0.1) !important; border-left: 4px solid var(--warning) !important; }
        .urgent-interview-2 { background-color: rgba(245, 158, 11, 0.05) !important; border-left: 4px solid #fbbf24 !important; }
        
        .urgent-card-0 { border: 2px solid var(--danger) !important; background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05)) !important; }
        .urgent-card-1 { border: 2px solid var(--warning) !important; background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05)) !important; }
        .urgent-card-2 { border: 2px solid #fbbf24 !important; background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), rgba(245, 158, 11, 0.02)) !important; }
        .interview-time-cell { color: var(--text-secondary); max-width: 60px; }
        
        /* 📱 개선된 반응형 디자인 - 2번 요청: 1024px 반응형 수정 */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .page-header { flex-direction: column; align-items: stretch; gap: 15px; }
            .header-actions { justify-content: center; flex-wrap: wrap; }
            .filter-bar { flex-direction: column; }
            .filter-group { width: 100%; }
            .interview-schedule-table { font-size: 0.8rem; }
            .interview-schedule-table th, .interview-schedule-table td { padding: 6px; }
            .pagination-container { flex-direction: column; gap: 15px; }
            .pagination-controls { justify-content: center; }

            /* =============================================================== */
            /* 화면 축소 시 상단 테이블 깨짐 현상 최종 수정 코드                 */
            /* =============================================================== */

            /* 1. 테이블을 감싸는 컨테이너에 스크롤을 적용합니다. */
            #interviewScheduleList {
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch; /* 모바일용 부드러운 스크롤 */
            }

            /* 2. 테이블 셀의 너비가 0으로 축소되는 것을 방지합니다. (가장 핵심적인 수정) */
            #interviewScheduleList .interview-schedule-table th,
            #interviewScheduleList .interview-schedule-table td {
                max-width: initial; /* 문제의 원인이었던 max-width: 0 스타일을 초기화합니다. */
            }
        }
        
        @media (max-width: 768px) {
            .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
            .mobile-overlay.show { display: block; }
            .mobile-menu-btn { display: block; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }
            .cards-container.active { grid-template-columns: 1fr; }
            .modal-content { width: 95%; padding: 20px; }
            .modal-body form { grid-template-columns: 1fr; }
            .sidebar-widgets { padding: 15px 10px; }
            .sidebar-widget { padding: 12px; margin-bottom: 10px; }
            .sidebar-widget-value { font-size: 1.2rem; }
            .interview-schedule-card { margin-bottom: 20px; padding: 20px; }
            .interview-schedule-table { display: block; overflow-x: auto; white-space: nowrap; }
            .pagination-numbers { display: none; }
        }
        
        @media (min-width: 1025px) {
            .mobile-menu-btn { display: none; }
        }
   
        /* --- 1. 반응형 모달 창을 위한 CSS 추가 --- */

        /* 모달 내용이 길어질 경우 세로 스크롤 생성 */
        .modal-body {
            max-height: 70vh; /* 모달 내용의 최대 높이를 화면의 70%로 제한 */
            overflow-y: auto; /* 내용이 높이를 초과하면 세로 스크롤 생성 */
        }

        /* 태블릿 등 중간 크기 화면 대응 */
        @media (max-width: 1024px) {
            .modal-body form {
                /* 폼을 3열에서 2열로 변경 */
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 768px 이하 모바일 화면 규칙은 이미 존재하여 1열로 자동 변경됩니다. */
        
        /* 로딩 애니메이션 */
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="mobile-overlay" onclick="toggleMobileMenu()"></div>
    
    <div class="app-container">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">채용 대시보드</div>
                <div class="sidebar-subtitle">Hiring Status</div>
            </div>
            <div class="nav-menu">
                <button class="nav-item active" onclick="switchPage('dashboard')"><i class="fas fa-users icon"></i> 현황</button>
                <button class="nav-item" onclick="switchPage('stats')"><i class="fas fa-chart-pie icon"></i> 통계</button>
            </div>
            
            <div class="sidebar-widgets">
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">전체 지원자</div>
                    <div class="sidebar-widget-value" id="sidebarTotalApplicants">0</div>
                </div>
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">이번 달</div>
                    <div class="sidebar-widget-value" id="sidebarMonthlyApplicants">0</div>
                </div>
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">면접 대기</div>
                    <div class="sidebar-widget-value" id="sidebarInterviewPending">0</div>
                </div>
                <div class="sidebar-widget">
                    <div class="sidebar-widget-title">합격률</div>
                    <div class="sidebar-widget-value" id="sidebarSuccessRate">0%</div>
                </div>
            </div>
        </nav>
        
        <main class="main-content">
            <header class="main-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="main-title" id="pageTitle">지원자 현황</h1>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" title="다크모드 토글 (Ctrl+D)">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </header>
            
            <div class="content-area">
                <div id="dashboard" class="page active">
                    <div class="interview-schedule-card">
                        <div class="interview-schedule-header">
                            <span class="interview-schedule-title">임박한 면접 일정</span>
                            <i class="fas fa-calendar-check interview-schedule-icon"></i>
                        </div>
                        <div id="interviewScheduleList">
                            <div class="no-interviews">예정된 면접이 없습니다.</div>
                        </div>
                    </div>
                    
                    <div class="page-header">
                        <h2 class="page-title">전체 지원자 목록</h2>
                        <div class="header-actions">
                            <div class="view-toggle">
                                <button class="view-btn active" onclick="switchView('table')" title="테이블 뷰 (Ctrl+1)">
                                    <i class="fas fa-table"></i>
                                </button>
                                <button class="view-btn" onclick="switchView('cards')" title="카드 뷰 (Ctrl+2)">
                                    <i class="fas fa-th-large"></i>
                                </button>
                            </div>
                            <button class="secondary-btn reset-btn" onclick="resetFilters()" title="필터 초기화 (Ctrl+R)">
                                <i class="fas fa-undo"></i> 필터 초기화
                            </button>
                            <div class="column-toggle-container">
                                <button class="secondary-btn" onclick="toggleColumnDropdown()"><i class="fas fa-columns"></i> 컬럼 설정</button>
                                <div class="column-toggle-dropdown" id="columnToggleDropdown"></div>
                            </div>
                             <button class="primary-btn" onclick="openNewApplicantModal()" title="신규 지원자 등록 (Ctrl+N)">
                                <i class="fas fa-plus"></i> 신규 지원자 등록
                            </button>
                        </div>
                    </div>
                    
                    <div class="filter-bar">
                        <div class="filter-group search-input">
                            <label for="globalSearch">통합 검색</label>
                            <div style="position: relative;">
                                <i class="fas fa-search search-icon"></i>
                                <input type="text" id="globalSearch" placeholder="이름, 연락처, 메모 등 검색..." onkeyup="handleSearch()" />
                            </div>
                        </div>
                        <div class="filter-group">
                            <label for="routeFilter">지원루트</label>
                            <select id="routeFilter" onchange="applyFilters()"><option value="all">전체</option></select>
                        </div>
                        <div class="filter-group">
                            <label for="positionFilter">모집분야</label>
                            <select id="positionFilter" onchange="applyFilters()"><option value="all">전체</option></select>

                         <div class="filter-group">

                                    <button class="date-mode-btn" data-mode="year">연</button>
                                    <button class="date-mode-btn" data-mode="month">월</button>
                                    <button class="date-mode-btn" data-mode="day">일</button>
                                    <button class="date-mode-btn" data-mode="range">기간</button>

                                <div id="dateInputsContainer"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="filter-summary" id="filterSummary"></div>
                    
                    <div class="content-container">
                        <div class="table-container" id="tableView">
                            <table class="data-table"></table>
                        </div>
                        <div class="cards-container" id="cardsView">
                        </div>
                        
                        <!-- 페이지네이션 컨테이너 -->
                        <div class="pagination-container" id="paginationContainer">
                            <div class="pagination-info" id="paginationInfo">
                                <!-- 페이지 정보가 여기에 표시됩니다 -->
                            </div>
                            <div class="pagination-controls">
                                <button class="pagination-btn" id="firstPageBtn" onclick="goToPage(1)">
                                    <i class="fas fa-angle-double-left"></i> 처음
                                </button>
                                <button class="pagination-btn" id="prevPageBtn" onclick="goToPrevPage()">
                                    <i class="fas fa-angle-left"></i> 이전
                                </button>
                                
                                <div class="pagination-numbers" id="paginationNumbers">
                                    <!-- 페이지 번호들이 여기에 표시됩니다 -->
                                </div>
                                
                                <button class="pagination-btn" id="nextPageBtn" onclick="goToNextPage()">
                                    다음 <i class="fas fa-angle-right"></i>
                                </button>
                                <button class="pagination-btn" id="lastPageBtn" onclick="goToLastPage()">
                                    마지막 <i class="fas fa-angle-double-right"></i>
                                </button>

                <div id="stats" class="page">
                    <div class="page-header"><h2 class="page-title">채용 통계 분석</h2></div>
                    <p>이곳에 통계 차트가 표시될 예정입니다.</p>
                </div>

        </main>
    </div>
    
    <div id="applicantModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">신규 지원자 등록</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body"><form id="applicantForm"></form></div>
            <div class="modal-footer">
                </div>
        </div>
    </div>
    
    <div class="keyboard-hint" id="keyboardHint">
        <strong>단축키:</strong> Ctrl+N 신규등록 | Ctrl+R 필터초기화 | Ctrl+D 다크모드 | Ctrl+1/2 뷰전환
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6vE_HEErU0BDqUOhusa2plkrApRJeb5v2q6KeCTMtV8oo74dbGB3XOrIpavnaZb2q/exec';

        let allApplicantData = [];
        let filteredData = [];
        let currentHeaders = [];
        
        // 페이지네이션 변수 추가
        let currentPage = 1;
        const itemsPerPage = 30;
        let totalPages = 1;
        
        // 5번 요청: '면접리뷰'를 기본 숨김 컬럼에 추가
        const DEFAULT_HIDDEN_COLUMNS = ['비고', '부재', '거절', '보류', '면접확정', '면접 날짜', '면접 시간', '미참석', '불합격/보류', '입과/출근', '입과일', '지점배치', '면접리뷰'];
        
        let visibleColumns = {};
        let nextSequenceNumber = 1;
        let activeDetailRowId = null;
        let currentSortColumn = '지원일';
        let currentSortDirection = 'desc';
        let activeDateMode = 'all';
        let currentView = 'table';
        let searchTerm = '';

        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            fetchData();
            setupDateFilterListeners();
            setupKeyboardShortcuts();
            setupEventListeners();
        });

        // 🌙 다크모드 초기화
        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        // 📱 모바일 메뉴
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.mobile-overlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('show');
        }

        // ⌨️ 키보드 단축키
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey) {
                    switch(e.key.toLowerCase()) {
                        case 'n': e.preventDefault(); openNewApplicantModal(); break;
                        case 'r': e.preventDefault(); resetFilters(); break;
                        case 'd': e.preventDefault(); toggleTheme(); break;
                        case '1': e.preventDefault(); switchView('table'); break;
                        case '2': e.preventDefault(); switchView('cards'); break;
                        case '/': e.preventDefault(); document.getElementById('globalSearch').focus(); break;
                    }
                }
                if (e.key === 'Escape') {
                    closeModal();
                    if(document.getElementById('sidebar').classList.contains('mobile-open')){
                        toggleMobileMenu();
                    }
                }
            });

            let hintTimeout;
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey) {
                    const hint = document.getElementById('keyboardHint');
                    hint.classList.add('show');
                    clearTimeout(hintTimeout);
                    hintTimeout = setTimeout(() => hint.classList.remove('show'), 3000);
                }
            });
        }

        function setupEventListeners() {
            document.addEventListener('click', function(event) {
                const dropdownContainer = document.querySelector('.column-toggle-container');
                if (dropdownContainer && !dropdownContainer.contains(event.target)) {
                    document.getElementById('columnToggleDropdown').style.display = 'none';
                }
                
                if (window.innerWidth <= 768) {
                    const sidebar = document.getElementById('sidebar');
                    if (sidebar.classList.contains('mobile-open') && !sidebar.contains(event.target) && !event.target.closest('.mobile-menu-btn')) {
                         toggleMobileMenu();
                    }
                }
            });
        }

        // 🗂️ 뷰 전환
        function switchView(viewType) {
            currentView = viewType;
            const tableView = document.getElementById('tableView');
            const cardsView = document.getElementById('cardsView');
            const viewBtns = document.querySelectorAll('.view-btn');
            
            viewBtns.forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.view-btn[onclick="switchView('${viewType}')"]`).classList.add('active');
            
            if (viewType === 'table') {
                tableView.style.display = 'block';
                cardsView.classList.remove('active');
            } else {
                tableView.style.display = 'none';
                cardsView.classList.add('active');
                renderCards(getCurrentPageData());
            }
        }

        // 🔍 통합 검색
        function handleSearch() {
            searchTerm = String(document.getElementById('globalSearch').value || '').toLowerCase();
            currentPage = 1; // 검색 시 첫 페이지로 이동
            applyFilters();
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelector(`.nav-item[onclick="switchPage('${pageId}')"]`).classList.add('active');
            const titles = { dashboard: '지원자 현황', stats: '통계 분석' };
            document.getElementById('pageTitle').textContent = titles[pageId];
            
            if (window.innerWidth <= 768 && document.getElementById('sidebar').classList.contains('mobile-open')) {
                toggleMobileMenu();
            }
        }

        const modal = document.getElementById('applicantModal');
        
        function openNewApplicantModal() {
            document.querySelector('#applicantModal .modal-title').textContent = '신규 지원자 등록';
            buildModalForm(); // 데이터 없이 폼 빌드
            document.querySelector('#applicantModal .modal-footer').innerHTML = `<button class="primary-btn" onclick="saveNewApplicant()">저장하기</button>`;
            modal.style.display = 'flex'; 
        }

        function closeModal() { 
            modal.style.display = 'none'; 
            document.getElementById('applicantForm').innerHTML = ''; // 폼 내용 비우기
        }
        window.onclick = function(event) { if (event.target == modal) closeModal(); }

        async function fetchData() {
            const tableContainer = document.querySelector('.table-container');
            tableContainer.innerHTML = `<p style="text-align:center; padding: 40px;"><i class="loading-spinner"></i> 데이터를 불러오는 중...</p>`;
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=read`);
                const result = await response.json();
                
                if (result.status !== 'success') throw new Error(result.message);

                currentHeaders = (result.data[0] || []).map(h => String(h || '').trim());
                allApplicantData = result.data.slice(1)
                    .filter(row => row && Array.isArray(row) && row.some(cell => cell != null && String(cell).trim() !== ''))
                    .map(row => row.map(cell => cell == null ? '' : String(cell)));
                
                const gubunIndex = currentHeaders.indexOf('구분');
                if (gubunIndex !== -1 && allApplicantData.length > 0) {
                    const lastRow = allApplicantData[allApplicantData.length - 1];
                    const lastGubun = parseInt(lastRow[gubunIndex] || '0', 10);
                    nextSequenceNumber = isNaN(lastGubun) ? allApplicantData.length + 1 : lastGubun + 1;
                } else {
                    nextSequenceNumber = allApplicantData.length + 1;
                }
                
                generateVisibleColumns(currentHeaders);
                setupColumnToggles();
                populateDropdownFilters();
                updateSidebarWidgets();
                updateInterviewSchedule();
                resetFilters(true);

            } catch (error) {
                console.error("데이터 불러오기 실패:", error);
                tableContainer.innerHTML = `<p style="text-align:center; padding: 40px; color: var(--danger);">데이터 로딩 중 오류 발생: ${error.message}</p>`;
            }
        }
        
        // 면접 시간 포맷팅 헬퍼 함수
        function formatInterviewTime(timeValue) {
            // 값이 없거나 '-' 이면 그대로 반환
            if (!timeValue || timeValue.trim() === '-') {
                return '-';
            }

            try {
                // '1899-12-30T22:11:00.000Z' 같은 문자열에서 Date 객체 생성
                const date = new Date(timeValue);

                // 만약 유효하지 않은 날짜 객체라면(예: "15:30" 같은 일반 텍스트),
                // 원본 값을 그대로 반환합니다.
                if (isNaN(date.getTime())) {
                    return String(timeValue);
                }

                // Date 객체에서 시간 부분만 'HH:mm' (24시간) 형식으로 추출합니다.
                // 브라우저가 UTC 시간을 자동으로 사용자 지역 시간으로 변환해줍니다.
                return date.toLocaleTimeString('ko-KR', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });

            } catch (e) {
                // 그 외의 에러가 발생하면 원본 값을 안전하게 반환
                return String(timeValue);
            }
        }

        // 📄 페이지네이션 함수들
        function calculateTotalPages() {
            return Math.ceil(filteredData.length / itemsPerPage);
        }

        function getCurrentPageData() {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, filteredData.length);
            return filteredData.slice(startIndex, endIndex);
        }

        function goToPage(page) {
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                if (currentView === 'table') {
                    renderTable(getCurrentPageData());
                } else {
                    renderCards(getCurrentPageData());
                }
                updatePaginationUI();
            }
        }

        function goToPrevPage() {
            goToPage(currentPage - 1);
        }

        function goToNextPage() {
            goToPage(currentPage + 1);
        }

        function goToLastPage() {
            goToPage(totalPages);
        }

        function updatePaginationUI() {
            const paginationContainer = document.getElementById('paginationContainer');
            const paginationInfo = document.getElementById('paginationInfo');
            const paginationNumbers = document.getElementById('paginationNumbers');
            const firstPageBtn = document.getElementById('firstPageBtn');
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');
            const lastPageBtn = document.getElementById('lastPageBtn');

            // 데이터가 없으면 페이지네이션 숨기기
            if (filteredData.length === 0) {
                paginationContainer.style.display = 'none';
                return;
            }

            paginationContainer.style.display = 'flex';

            // 페이지 정보 업데이트
            const startItem = (currentPage - 1) * itemsPerPage + 1;
            const endItem = Math.min(currentPage * itemsPerPage, filteredData.length);
            paginationInfo.textContent = `${startItem}-${endItem} / ${filteredData.length}명`;

            // 버튼 상태 업데이트
            firstPageBtn.disabled = currentPage === 1;
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = currentPage === totalPages;
            lastPageBtn.disabled = currentPage === totalPages;

            // 페이지 번호 생성
            paginationNumbers.innerHTML = '';
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

            // 끝 페이지가 조정되면 시작 페이지도 재조정
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            // 첫 페이지 표시
            if (startPage > 1) {
                const firstPageNum = document.createElement('button');
                firstPageNum.className = 'pagination-number';
                firstPageNum.textContent = '1';
                firstPageNum.onclick = () => goToPage(1);
                paginationNumbers.appendChild(firstPageNum);

                if (startPage > 2) {
                    const ellipsis = document.createElement('span');
                    ellipsis.className = 'pagination-ellipsis';
                    ellipsis.textContent = '...';
                    paginationNumbers.appendChild(ellipsis);
                }
            }

            // 중간 페이지들 표시
            for (let i = startPage; i <= endPage; i++) {
                const pageNum = document.createElement('button');
                pageNum.className = `pagination-number ${i === currentPage ? 'active' : ''}`;
                pageNum.textContent = i;
                pageNum.onclick = () => goToPage(i);
                paginationNumbers.appendChild(pageNum);
            }

            // 마지막 페이지 표시
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    const ellipsis = document.createElement('span');
                    ellipsis.className = 'pagination-ellipsis';
                    ellipsis.textContent = '...';
                    paginationNumbers.appendChild(ellipsis);
                }

                const lastPageNum = document.createElement('button');
                lastPageNum.className = 'pagination-number';
                lastPageNum.textContent = totalPages;
                lastPageNum.onclick = () => goToPage(totalPages);
                paginationNumbers.appendChild(lastPageNum);
            }
        }

        // 📊 사이드바 위젯 업데이트
        function updateSidebarWidgets() {
            const total = allApplicantData.length;
            const currentMonth = new Date().getMonth() + 1;
            const currentYear = new Date().getFullYear();
            const applyDateIndex = currentHeaders.indexOf('지원일');
            
            const monthlyCount = allApplicantData.filter(row => {
                try {
                    const dateValue = row[applyDateIndex];
                    if (!dateValue) return false;
                    const date = new Date(dateValue);
                    return date.getMonth() + 1 === currentMonth && date.getFullYear() === currentYear;
                } catch (e) { return false; }
            }).length;
            
            const statusColumns = ['부재', '거절', '보류', '면접확정', '미참석', '불합격/보류', '입과/출근'];
            const pendingCount = allApplicantData.filter(row => {
                return statusColumns.every(status => {
                    const index = currentHeaders.indexOf(status);
                    return index === -1 || String(row[index] || '').trim() === '';
                });
            }).length;
            
            const successStatuses = ['입과', '출근'];
            const successCount = allApplicantData.filter(row => {
                return successStatuses.some(status => {
                    const index = currentHeaders.indexOf(status);
                    return index !== -1 && String(row[index] || '').trim() !== '';
                });
            }).length;
            
            const successRate = total > 0 ? Math.round((successCount / total) * 100) : 0;
            
            document.getElementById('sidebarTotalApplicants').textContent = total;
            document.getElementById('sidebarMonthlyApplicants').textContent = monthlyCount;
            document.getElementById('sidebarInterviewPending').textContent = pendingCount;
            document.getElementById('sidebarSuccessRate').textContent = successRate + '%';
        }
        
        // 📅 임박한 면접 일정 업데이트
        function updateInterviewSchedule() {
            let interviewDateIndex = currentHeaders.indexOf('면접 날짜');
            if (interviewDateIndex === -1) interviewDateIndex = currentHeaders.indexOf('면접 날자');
            
            const interviewTimeIndex = currentHeaders.indexOf('면접 시간');
            const nameIndex = currentHeaders.indexOf('이름');
            const positionIndex = currentHeaders.indexOf('모집분야');
            const routeIndex = currentHeaders.indexOf('지원루트');
            const recruiterIndex = currentHeaders.indexOf('증원자');
            const interviewerIndex = currentHeaders.indexOf('면접자');
            
            if (interviewDateIndex === -1) {
                document.getElementById('interviewScheduleList').innerHTML = '<div class="no-interviews">면접 날짜 컬럼을 찾을 수 없습니다.</div>';
                return;
            }
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const threeDaysLater = new Date(today.getTime() + (3 * 24 * 60 * 60 * 1000));
            
            const upcomingInterviews = allApplicantData
                .filter(row => {
                    const interviewDate = row[interviewDateIndex];
                    if (!interviewDate) return false;
                    try {
                        const date = new Date(interviewDate);
                        return date >= today && date <= threeDaysLater;
                    } catch (e) { return false; }
                })
                .sort((a, b) => new Date(a[interviewDateIndex]) - new Date(b[interviewDateIndex]))
                .slice(0, 7);
            
            const scheduleContainer = document.getElementById('interviewScheduleList');
            
            if (upcomingInterviews.length === 0) {
                scheduleContainer.innerHTML = '<div class="no-interviews">3일 이내 예정된 면접이 없습니다.</div>';
                return;
            }
            
            let tableHtml = `
                <table class="interview-schedule-table">
                    <thead>
                        <tr>
                            <th>이름</th><th>지원루트</th><th>증원자</th><th>모집분야</th><th>면접자</th><th>면접날짜</th><th>면접시간</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            upcomingInterviews.forEach(row => {
                const interviewDate = row[interviewDateIndex];
                let dateDisplay = '';
                
                const formattedTime = formatInterviewTime(row[interviewTimeIndex]);

                try {
                    const date = new Date(interviewDate);
                    date.setHours(0, 0, 0, 0);
                    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
                    const weekday = weekdays[date.getDay()];
                    
                    const diffTime = date.getTime() - today.getTime();
                    const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                    let dayDiff = `D-${diffDays}`;
                    let ddayClass = '';
                    if (diffDays === 0) { dayDiff = 'D-Day'; ddayClass = 'today'; }
                    
                    const dateText = `${date.getMonth() + 1}/${date.getDate()}(${weekday})`;
                    dateDisplay = `<span class="interview-dday ${ddayClass}">${dayDiff}</span><span class="interview-date-text">${dateText}</span>`;
                } catch (e) { dateDisplay = '날짜 오류'; }
                
                tableHtml += `
                    <tr onclick="showInterviewDetails('${row[nameIndex] || ''}', '${row[routeIndex] || ''}')" style="cursor: pointer;">
        <td class="interview-name-cell" title="${row[nameIndex] || ''}">${row[nameIndex] || '-'}</td>
        <td class="interview-route-cell" title="${row[routeIndex] || ''}">${row[routeIndex] || '-'}</td>
                        <td class="interview-recruiter-cell" title="${row[recruiterIndex] || ''}">${row[recruiterIndex] || '-'}</td>
                        <td class="interview-position-cell" title="${row[positionIndex] || ''}">${row[positionIndex] || '-'}</td>
                        <td class="interview-interviewer-cell" title="${row[interviewerIndex] || ''}">${row[interviewerIndex] || '-'}</td>
                        <td class="interview-date-cell" title="${dateDisplay.replace(/<[^>]*>/g, '')}">${dateDisplay}</td>
                        <td class="interview-time-cell" title="${formattedTime}">${formattedTime}</td>
                    </tr>
                `;
            });
            
            tableHtml += `</tbody></table>`;
            scheduleContainer.innerHTML = tableHtml;
        }
        
        function getInterviewUrgency(interviewDate) {
            if (!interviewDate) return -1;
            try {
                const today = new Date(); today.setHours(0, 0, 0, 0);
                const date = new Date(interviewDate); date.setHours(0, 0, 0, 0);
                const diffTime = date.getTime() - today.getTime();
                const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays >= 0 && diffDays <= 2) return diffDays;
                return -1;
            } catch (e) { return -1; }
        }
        
        async function saveNewApplicant() {
            const saveBtn = document.querySelector('#applicantModal .modal-footer .primary-btn');
            const originalText = saveBtn.innerHTML;
            try {
                const applicantData = {};
                let isFormValid = true;
                
                // 폼 데이터 수집
                currentHeaders.forEach(header => {
                    const input = document.getElementById(`modal-form-${header}`);
                    const customInput = document.getElementById(`modal-form-${header}-custom`);
                    if (input) {
                        let value = (customInput && customInput.style.display !== 'none') ? customInput.value : input.value;
                        applicantData[header] = value;
                        if ((input.hasAttribute('required') || (customInput && customInput.hasAttribute('required'))) && !value) {
                            isFormValid = false;
                        }
                    }
                });

                // 자동 설정 필드들
                if (currentHeaders.includes('구분')) applicantData['구분'] = nextSequenceNumber.toString();
                if (currentHeaders.includes('지원일')) applicantData['지원일'] = new Date().toISOString().split('T')[0];

                if (!isFormValid) { 
                    alert('필수 항목을 모두 입력해주세요.'); 
                    return; 
                }

                // '면접 시간' 값을 서버로 보내기 전, 앞에 작은따옴표(')를 붙여 텍스트로 강제합니다.
                const timeHeader = '면접 시간';
                if (applicantData[timeHeader]) {
                    applicantData[timeHeader] = "'" + applicantData[timeHeader];
                }
                
                saveBtn.disabled = true;
                saveBtn.innerHTML = '<i class="loading-spinner"></i> 저장 중...';
                
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'create', data: applicantData })
                });
                
                const result = await response.json();
                if (result.status !== 'success') {
                    throw new Error(result.message || '저장에 실패했습니다.');
                }
                
                closeModal();
                fetchData();
                
            } catch (error) {
                console.error("데이터 저장 실패:", error);
                alert("데이터 저장 중 오류 발생: " + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        }

        function applyFilters() {
            let data = [...allApplicantData];
            const routeFilter = document.getElementById('routeFilter').value;
            const positionFilter = document.getElementById('positionFilter').value;
            const applyDateIndex = currentHeaders.indexOf('지원일');
            const routeIndex = currentHeaders.indexOf('지원루트');
            const positionIndex = currentHeaders.indexOf('모집분야');

            if (searchTerm) {
                data = data.filter(row => row.some(cell => String(cell || '').toLowerCase().includes(searchTerm)));
            }

            if (routeFilter !== 'all' && routeIndex !== -1) data = data.filter(row => String(row[routeIndex] || '') === routeFilter);
            if (positionFilter !== 'all' && positionIndex !== -1) data = data.filter(row => String(row[positionIndex] || '') === positionFilter);
            
            if (applyDateIndex !== -1 && activeDateMode !== 'all') {
                try {
                    if (activeDateMode === 'year') {
                        const year = document.getElementById('dateInput')?.value;
                        if(year) data = data.filter(row => row[applyDateIndex] && new Date(row[applyDateIndex]).getFullYear() == year);
                    } else if (activeDateMode === 'month') {
                        const month = document.getElementById('dateInput')?.value;
                        if(month) data = data.filter(row => String(row[applyDateIndex] || '').slice(0, 7) === month);
                    } else if (activeDateMode === 'day') {
                        const day = document.getElementById('dateInput')?.value;
                        if(day) data = data.filter(row => String(row[applyDateIndex] || '').slice(0, 10) === day);
                    } else if (activeDateMode === 'range') {
                        const startDate = document.getElementById('startDateInput')?.value;
                        const endDate = document.getElementById('endDateInput')?.value;
                        if (startDate && endDate) {
                            const start = new Date(startDate);
                            const end = new Date(endDate); end.setHours(23, 59, 59, 999);
                            data = data.filter(row => {
                                if(!row[applyDateIndex]) return false;
                                const applyDate = new Date(row[applyDateIndex]);
                                return applyDate >= start && applyDate <= end;
                            });
                        }
                    }
                } catch(e) { console.error("날짜 필터링 오류", e); }
            }
            
            filteredData = sortData(data);
            
            // 페이지네이션 관련 업데이트
            totalPages = calculateTotalPages();
            if (currentPage > totalPages && totalPages > 0) {
                currentPage = totalPages;
            } else if (totalPages === 0) {
                currentPage = 1;
            }
            
            updateSummary(filteredData.length);
            
            if (currentView === 'table') {
                renderTable(getCurrentPageData());
            } else {
                renderCards(getCurrentPageData());
            }
            
            updatePaginationUI();
        }

        function sortData(data) {
            if (currentSortColumn && currentSortDirection) {
                const sortIndex = currentHeaders.indexOf(currentSortColumn);
                if (sortIndex !== -1) {
                    data.sort((a, b) => {
                        let valA = a[sortIndex]; 
                        let valB = b[sortIndex];
                        
                        if (currentSortColumn === '지원일' || currentSortColumn.includes('날짜') || currentSortColumn.includes('날자') || currentSortColumn.includes('입과일')) {
                            valA = new Date(valA || '1970-01-01'); valB = new Date(valB || '1970-01-01');
                        } else if (['나이', '구분'].includes(currentSortColumn)) {
                            valA = Number(valA) || 0; valB = Number(valB) || 0;
                        } else {
                            valA = String(valA || '').toLowerCase(); valB = String(valB || '').toLowerCase();
                        }
                        
                        if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
                        if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
            }
            return data;
        }

        function resetFilters(runApplyFilters = true) {
            document.querySelectorAll('.filter-bar select').forEach(select => select.value = 'all');
            document.getElementById('globalSearch').value = '';
            searchTerm = '';
            activeDateMode = 'all';
            currentPage = 1; // 필터 초기화 시 첫 페이지로 이동
            updateDateFilterUI(); 
            if (runApplyFilters) applyFilters();
        }
        
        function updateSummary(filteredCount) {
            const searchText = searchTerm ? ` (검색: "${searchTerm}")` : '';
            const pageInfo = filteredCount > itemsPerPage ? ` - ${currentPage}/${totalPages} 페이지` : '';
            document.getElementById('filterSummary').innerHTML = `<strong>지원자:</strong> ${filteredCount}명${searchText}${pageInfo}`;
        }

            if (routeIndex !== -1) {

        function sortTable(columnName) {
            if (currentSortColumn === columnName) {
                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : '';
                if (currentSortDirection === '') { currentSortColumn = '지원일'; currentSortDirection = 'desc'; }
            } else {
                currentSortColumn = columnName;
                currentSortDirection = 'asc';
            }
            applyFilters();
        }

        function getStatusClass(header, value) {
            if (!value) return '';
            const valueStr = String(value).trim();
            if (valueStr === '') return '';
            
            const statusMap = {
                '합격': 'status-합격', '입과': 'status-입과', '출근': 'status-출근',
                '불합격': 'status-불합격', '거절': 'status-거절', '미참석': 'status-미참석',
                '보류': 'status-보류', '면접확정': 'status-면접확정', '대기': 'status-대기'
            };
            
            for (const [status, className] of Object.entries(statusMap)) {
                if (valueStr.includes(status)) return className;
            }
            return '';
        }
        
        function renderTable(dataToRender) {
            const tableContainer = document.querySelector('.table-container');
            tableContainer.innerHTML = '';
            const table = document.createElement('table');
            table.className = 'data-table';
            
            const thead = table.createTHead();
            const headerRow = thead.insertRow();
            currentHeaders.forEach(header => {
                if (visibleColumns[header]) {
                    const th = document.createElement('th');
                    th.className = 'sortable-header';
                    th.onclick = () => sortTable(header);
                    let sortIcon = 'fa-sort';
                    if (currentSortColumn === header && currentSortDirection) {
                        sortIcon = currentSortDirection === 'asc' ? 'fa-sort-up' : 'fa-sort-down';
                    }
                    th.innerHTML = `${header} <i class="fas ${sortIcon} sort-icon ${currentSortColumn === header ? 'active' : ''}"></i>`;
                    headerRow.appendChild(th);
                }
            });

            const tbody = table.createTBody();
            if (dataToRender.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell();
                cell.colSpan = Object.values(visibleColumns).filter(Boolean).length || 1;
                cell.textContent = '표시할 데이터가 없습니다.';
                cell.style.textAlign = 'center'; cell.style.padding = '40px';
            } else {
                let interviewDateIndex = currentHeaders.indexOf('면접 날짜');
                if (interviewDateIndex === -1) interviewDateIndex = currentHeaders.indexOf('면접 날자');
                const gubunIndex = currentHeaders.indexOf('구분');
                
                dataToRender.forEach((rowData, index) => {
                    const rowId = `row-${index}`;
                    const row = tbody.insertRow();
                    row.id = rowId;
                    row.onclick = (event) => { if (event.target.tagName !== 'A') toggleDetails(rowId, rowData); };
                    
                    if (interviewDateIndex !== -1) {
                        const urgency = getInterviewUrgency(rowData[interviewDateIndex]);
                        if (urgency >= 0) row.classList.add(`urgent-interview-${urgency}`);
                    }
                    
                    currentHeaders.forEach((header, cellIndex) => {
                        if (visibleColumns[header]) {
                            const cell = row.insertCell();
                            let cellData = rowData[cellIndex];
                            
                            // 구분값을 순서대로 표시 (실제 데이터와 무관하게)
                            if (header === '구분') {
                                const displaySequence = (currentPage - 1) * itemsPerPage + index + 1;
                                cellData = displaySequence;
                            }
                            
                            const statusClass = getStatusClass(header, cellData);
                            if (statusClass) {
                                cell.innerHTML = `<span class="status-badge ${statusClass}">${String(cellData || '')}</span>`;
                            } else if (header === '연락처' && cellData) {
                                cell.innerHTML = `<a href="tel:${String(cellData).replace(/\D/g, '')}">${cellData}</a>`;
                            } else if (header === '면접 시간' && cellData) {
                                cell.textContent = formatInterviewTime(cellData);
                            } else if ((header.includes('날짜') || header.includes('날자') || header.includes('지원일') || header.includes('입과일')) && cellData) {
                                try {
                                    const date = new Date(cellData);
                                    cell.textContent = date.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
                                } catch (e) { cell.textContent = String(cellData || ''); }
                            } else {
                                cell.textContent = String(cellData || '');
                            }
                        }
                    });
                    
                    const detailRow = tbody.insertRow();
                    detailRow.className = 'detail-row';
                    detailRow.id = `detail-${rowId}`;
                    const detailCell = detailRow.insertCell();
                    detailCell.colSpan = Object.values(visibleColumns).filter(Boolean).length;
                    detailCell.innerHTML = `<div class="detail-content"></div>`;
                });
            }
            
            tableContainer.appendChild(table);
        }

            // 모든 열린 상세 정보 닫기

        function setupDateFilterListeners() {

                    updateDateFilterUI();
                    applyFilters();
                }
            });
