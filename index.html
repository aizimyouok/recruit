<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채용 현황 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #4a5568; --sidebar-header-bg: #2d3748; --sidebar-text: #e2e8f0;
            --sidebar-accent: #818cf8; --main-bg: #f8fafc; --content-bg: #ffffff;
            --text-primary: #334155; --text-secondary: #64748b; --border-color: #e2e8f0;
            --accent-orange: #fb923c;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --border-radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--main-bg); color: var(--text-primary); }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; position: fixed; height: 100%; }
        .sidebar-header { padding: 25px 20px; background: var(--sidebar-header-bg); }
        .sidebar-title { font-size: 1.5rem; font-weight: 700; }
        .sidebar-subtitle { font-size: 0.85rem; color: #a0aec0; }
        .nav-menu { padding: 15px 0; }
        .nav-item { display: flex; align-items: center; padding: 14px 20px; color: var(--sidebar-text); text-decoration: none; transition: background-color 0.2s; border-left: 4px solid transparent; cursor: pointer; background: none; border: none; width: 100%; text-align: left; font-size: 1rem; }
        .nav-item:hover { background: #718096; }
        .nav-item.active { background: #718096; border-left-color: var(--sidebar-accent); font-weight: 500;}
        .nav-item .icon { margin-right: 15px; width: 20px; text-align: center; }
        .main-content { flex: 1; margin-left: 260px; display: flex; flex-direction: column; }
        .main-header { background: var(--content-bg); padding: 18px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .main-title { font-size: 1.7rem; font-weight: 700; }
        .content-area { padding: 30px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .page-title { font-size: 1.8rem; font-weight: 500; }
        .header-actions { display: flex; gap: 10px; }
        .primary-btn, .secondary-btn { padding: 10px 20px; font-size: 0.95rem; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .primary-btn { background-color: var(--sidebar-accent); color: white; }
        .primary-btn:hover { filter: brightness(1.1); }
        .secondary-btn { background-color: #f1f5f9; color: var(--text-secondary); border: 1px solid var(--border-color); }
        .secondary-btn.reset-btn { background-color: var(--accent-orange); color: white; }
        .secondary-btn:hover { background-color: #e2e8f0; }
        .filter-bar { display: flex; gap: 15px; align-items: flex-end; padding: 20px; background: var(--content-bg); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); margin-bottom: 20px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-weight: 500; font-size: 0.9rem; margin-bottom: 5px; }
        .filter-group input, .filter-group select { padding: 10px 12px; font-size: 0.9rem; border: 1px solid var(--border-color); border-radius: 6px; width: 100%; transition: all 0.2s;}
        .filter-group input.filter-active, .filter-group select.filter-active { border-color: var(--sidebar-accent); box-shadow: 0 0 0 3px #ddd6fe; }
        #dateInputsContainer { display: flex; gap: 10px; align-items: flex-end; }
        .filter-summary { margin: -10px 0 15px 5px; color: var(--text-primary); font-weight: 500; font-size: 1rem;}
        .filter-summary strong { color: var(--sidebar-accent); margin-right: 5px; }
        .table-container { background-color: var(--content-bg); border-radius: var(--border-radius); box-shadow: var(--shadow-sm); overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px; border-bottom: 1px solid var(--border-color); text-align: center; white-space: nowrap; font-size: 0.95rem; }
        .data-table thead th { background-color: #f8fafc; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; position: sticky; top: 0; z-index: 1;}
        .data-table th.sortable-header { cursor: pointer; user-select: none; }
        .data-table th.sortable-header:hover { background-color: #f1f5f9; }
        .data-table .sort-icon { margin-left: 8px; color: #cbd5e1; transition: color 0.2s; }
        .data-table .sort-icon.active { color: var(--sidebar-accent); }
        .data-table tbody tr:not(.detail-row) { cursor: pointer; }
        .data-table tbody tr:not(.detail-row):hover { background-color: #f1f5f9; }
        .data-table td a { color: var(--sidebar-accent); font-weight: 500; text-decoration: none; }
        .data-table td a:hover { text-decoration: underline; }
        .data-table .detail-row { display: none; }
        .data-table .detail-row.show { display: table-row; background-color: #fafbff; }
        .detail-content { padding: 20px; box-shadow: inset 0 4px 6px -1px rgba(0,0,0,0.05);}
        .detail-table { width: 100%; border-spacing: 0; border-collapse: collapse; }
        .detail-table td { padding: 10px; border-bottom: 1px solid var(--border-color); white-space: normal; text-align: left;}
        .detail-table tr:last-child td { border-bottom: none; }
        .detail-table strong { color: var(--text-secondary); display: inline-block; width: 100px; font-weight: 500;}
        .column-toggle-container { position: relative; }
        .column-toggle-dropdown { display: none; position: absolute; top: 100%; right: 0; margin-top: 5px; background-color: var(--content-bg); border: 1px solid var(--border-color); border-radius: var(--border-radius); box-shadow: var(--shadow-md); padding: 15px; width: 200px; z-index: 100; }
        .column-toggle-item { display: flex; align-items: center; margin-bottom: 10px; }
        .column-toggle-item:last-child { margin-bottom: 0; }
        .column-toggle-item input { margin-right: 10px; width: 16px; height: 16px; }
        .column-toggle-item label { cursor: pointer; font-size: 0.95rem; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background-color: var(--content-bg); padding: 30px; border-radius: var(--border-radius); box-shadow: 0 5px 15px rgba(0,0,0,0.3); width: 90%; max-width: 900px; }
        .modal-body form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.5rem; }
        .close-btn { font-size: 1.8rem; color: var(--text-secondary); cursor: pointer; background: none; border: none; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px; font-size: 1rem; border: 1px solid var(--border-color); border-radius: 6px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .modal-footer { text-align: right; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">채용 대시보드</div>
                <div class="sidebar-subtitle">Hiring Status</div>
            </div>
            <div class="nav-menu">
                <button class="nav-item active" onclick="switchPage('dashboard')"><i class="fas fa-users icon"></i> 현황</button>
                <button class="nav-item" onclick="switchPage('stats')"><i class="fas fa-chart-pie icon"></i> 통계</button>
            </div>
        </nav>
        <main class="main-content">
            <header class="main-header">
                <h1 class="main-title" id="pageTitle">지원자 현황</h1>
            </header>
            <div class="content-area">
                <div id="dashboard" class="page active">
                    <div class="page-header">
                        <h2 class="page-title">전체 지원자 목록</h2>
                        <div class="header-actions">
                            <button class="secondary-btn reset-btn" onclick="resetFilters()"><i class="fas fa-undo"></i> 필터 초기화</button>
                            <div class="column-toggle-container">
                                <button class="secondary-btn" onclick="toggleColumnDropdown()"><i class="fas fa-columns"></i> 컬럼 설정</button>
                                <div class="column-toggle-dropdown" id="columnToggleDropdown"></div>
                            </div>
                            <button class="primary-btn" onclick="openModal()"><i class="fas fa-plus"></i> 신규 지원자 등록</button>
                        </div>
                    </div>
                    <div class="filter-bar">
                        <div class="filter-group">
                            <label for="routeFilter">지원루트</label>
                            <select id="routeFilter" onchange="applyFilters()"><option value="all">전체</option></select>
                        </div>
                        <div class="filter-group">
                            <label for="positionFilter">모집분야</label>
                            <select id="positionFilter" onchange="applyFilters()"><option value="all">전체</option></select>
                        </div>
                        <div class="filter-group">
                            <label for="dateFilterType">날짜 필터</label>
                            <select id="dateFilterType" onchange="handleDateFilterChange()">
                                <option value="month">월별</option>
                                <option value="year">연도별</option>
                                <option value="day">특정일</option>
                                <option value="range">기간</option>
                                <option value="all">전체기간</option>
                            </select>
                        </div>
                        <div id="dateInputsContainer" style="display: flex; gap: 10px; align-items: flex-end;">
                            </div>
                    </div>
                    <div class="filter-summary" id="filterSummary"></div>
                    <div class="table-container">
                        <table class="data-table"></table>
                    </div>
                </div>
                <div id="stats" class="page">
                    <div class="page-header"><h2 class="page-title">채용 통계 분석</h2></div>
                    <p>이곳에 통계 차트가 표시될 예정입니다.</p>
                </div>
            </div>
        </main>
    </div>
    <div id="applicantModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 class="modal-title">신규 지원자 등록</h3><button class="close-btn" onclick="closeModal()">&times;</button></div>
            <div class="modal-body"><form id="applicantForm"></form></div>
            <div class="modal-footer"><button class="primary-btn" onclick="saveNewApplicant()">저장하기</button></div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6vE_HEErU0BDqUOhusa2plkrApRJeb5v2q6KeCTMtV8oo74dbGB3XOrIpavnaZb2q/exec';

        let allApplicantData = [];
        let currentHeaders = [];
        const DEFAULT_HIDDEN_COLUMNS = ['비고', '부재', '거절', '보류', '면접 확정', '미참석', '불합격/보류', '입과/출근'];
        let visibleColumns = {};
        let nextSequenceNumber = 1;
        let activeDetailRowId = null;
        let currentSortColumn = '지원일';
        let currentSortDirection = 'desc';

        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            document.addEventListener('click', function(event) {
                const dropdownContainer = document.querySelector('.column-toggle-container');
                if (dropdownContainer && !dropdownContainer.contains(event.target)) {
                    document.getElementById('columnToggleDropdown').style.display = 'none';
                }
            });
        });

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelector(`.nav-item[onclick="switchPage('${pageId}')"]`).classList.add('active');
            const titles = { dashboard: '지원자 현황', stats: '통계 분석' };
            document.getElementById('pageTitle').textContent = titles[pageId];
        }

        const modal = document.getElementById('applicantModal');
        function openModal() { buildModalForm(); modal.style.display = 'flex'; }
        function closeModal() { modal.style.display = 'none'; document.getElementById('applicantForm').reset(); }
        window.onclick = function(event) { if (event.target == modal) closeModal(); }

        async function fetchData() {
            const tableContainer = document.querySelector('.table-container');
            tableContainer.innerHTML = `<p style="text-align:center; padding: 40px;">데이터를 불러오는 중...</p>`;
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=read`);
                const result = await response.json();
                if (result.status !== 'success') throw new Error(result.message);

                currentHeaders = result.data[0] || [];
                allApplicantData = result.data.slice(1).filter(row => row.some(cell => cell !== ''));
                
                const gubunIndex = currentHeaders.indexOf('구분');
                if (gubunIndex !== -1 && allApplicantData.length > 0) {
                    const lastGubun = parseInt(allApplicantData[allApplicantData.length - 1][gubunIndex], 10);
                    nextSequenceNumber = isNaN(lastGubun) ? allApplicantData.length + 1 : lastGubun + 1;
                } else {
                    nextSequenceNumber = allApplicantData.length + 1;
                }
                
                generateVisibleColumns(currentHeaders);
                setupColumnToggles();
                populateDropdownFilters();
                handleDateFilterChange(); // Set default date UI
                applyFilters(); 
            } catch (error) {
                console.error("데이터 불러오기 실패:", error);
                tableContainer.innerHTML = `<p style="text-align:center; padding: 40px; color: var(--danger-color);">데이터 로딩 중 오류 발생: ${error.message}</p>`;
            }
        }
        
        async function saveNewApplicant() {
            const saveBtn = document.querySelector('.modal-footer .primary-btn');
            try {
                const applicantData = {};
                let isFormValid = true;
                currentHeaders.forEach(header => {
                    const input = document.getElementById(`modal-form-${header}`);
                    if (input) {
                        applicantData[header] = input.value;
                        if (input.hasAttribute('required') && !input.value) { isFormValid = false; }
                    }
                });

                if (!isFormValid) { alert('필수 항목을 모두 입력해주세요.'); return; }

                saveBtn.disabled = true;
                saveBtn.textContent = '저장 중...';

                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'create', data: applicantData })
                });
                
                closeModal();
                location.reload();

            } catch (error) {
                console.error("데이터 저장 실패:", error);
                alert("데이터 저장 중 오류 발생: " + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '저장하기';
            }
        }

        function applyFilters() {
    // 필터 입력 값에 따라 스타일 동적 적용
    document.querySelectorAll('.filter-bar input, .filter-bar select').forEach(input => {
        const isActive = (input.type === 'date' && input.value) || (input.type !== 'date' && input.value && input.value !== 'all');
        input.classList.toggle('filter-active', isActive);
    });

    let filteredData = [...allApplicantData];
    
    // 드롭다운 및 날짜 필터링 로직 (기존과 동일)
    const routeFilter = document.getElementById('routeFilter').value;
    const positionFilter = document.getElementById('positionFilter').value;
    const dateFilterType = document.getElementById('dateFilterType').value;

    const routeIndex = currentHeaders.indexOf('지원루트');
    const positionIndex = currentHeaders.indexOf('모집분야');
    const applyDateIndex = currentHeaders.indexOf('지원일');

    if (routeFilter !== 'all' && routeIndex !== -1) filteredData = filteredData.filter(row => row[routeIndex] === routeFilter);
    if (positionFilter !== 'all' && positionIndex !== -1) filteredData = filteredData.filter(row => row[positionIndex] === positionFilter);

    if (applyDateIndex !== -1) {
        if (dateFilterType === 'year') {
            const year = document.getElementById('yearInput').value;
            if(year) filteredData = filteredData.filter(row => row[applyDateIndex] && new Date(row[applyDateIndex]).getFullYear() == year);
        } else if (dateFilterType === 'month') {
            const month = document.getElementById('monthInput').value;
            if(month) filteredData = filteredData.filter(row => row[applyDateIndex] && row[applyDateIndex].slice(0, 7) === month);
        } else if (dateFilterType === 'day') {
            const day = document.getElementById('dayInput').value;
            if(day) filteredData = filteredData.filter(row => row[applyDateIndex] && row[applyDateIndex].slice(0, 10) === day);
        } else if (dateFilterType === 'range') {
            const startDate = document.getElementById('startDateInput').value;
            const endDate = document.getElementById('endDateInput').value;
            if (startDate && endDate) {
                const start = new Date(startDate);
                const end = new Date(endDate);
                end.setHours(23, 59, 59, 999);
                filteredData = filteredData.filter(row => {
                    if(!row[applyDateIndex]) return false;
                    const applyDate = new Date(row[applyDateIndex]);
                    return applyDate >= start && applyDate <= end;
                });
            }
        }
    }
    
    // ▼▼▼ 정렬 로직을 이 함수 안으로 다시 옮겼습니다 ▼▼▼
    if (currentSortColumn && currentSortDirection) {
        const sortIndex = currentHeaders.indexOf(currentSortColumn);
        if (sortIndex !== -1) {
            filteredData.sort((a, b) => {
                let valA = a[sortIndex];
                let valB = b[sortIndex];
                
                if (currentSortColumn === '지원일') {
                    valA = new Date(valA || '1970-01-01');
                    valB = new Date(valB || '1970-01-01');
                } else if (currentSortColumn === '나이' || currentSortColumn === '구분') {
                    valA = Number(valA) || 0;
                    valB = Number(valB) || 0;
                } else {
                    valA = String(valA || '').toLowerCase();
                    valB = String(valB || '').toLowerCase();
                }
                
                if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }
    }
    
    updateSummary(filteredData.length);
    renderTable(filteredData);
}

        function resetFilters() {
            document.querySelectorAll('.filter-bar select').forEach(select => select.value = 'all');
            document.getElementById('dateFilterType').value = 'month';
            handleDateFilterChange(true); // true to signal reset
            applyFilters();
        }
        
        function updateSummary(filteredCount) {
            document.getElementById('filterSummary').innerHTML = `<strong>지원자:</strong> ${filteredCount}명`;
        }

        function populateDropdownFilters() {
            const routeIndex = currentHeaders.indexOf('지원루트');
            const positionIndex = currentHeaders.indexOf('모집분야');

            if (routeIndex !== -1) {
                const routes = [...new Set(allApplicantData.map(row => row[routeIndex]).filter(Boolean))];
                const routeFilter = document.getElementById('routeFilter');
                routeFilter.innerHTML = '<option value="all">전체</option>';
                routes.sort().forEach(route => routeFilter.innerHTML += `<option value="${route}">${route}</option>`);
            }
            if (positionIndex !== -1) {
                const positions = [...new Set(allApplicantData.map(row => row[positionIndex]).filter(Boolean))];
                const positionFilter = document.getElementById('positionFilter');
                positionFilter.innerHTML = '<option value="all">전체</option>';
                positions.sort().forEach(pos => positionFilter.innerHTML += `<option value="${pos}">${pos}</option>`);
            }
        }
        
        function sortTable(columnName) {
            if (currentSortColumn === columnName) {
                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : '';
                if (currentSortDirection === '') { currentSortColumn = '지원일'; currentSortDirection = 'desc'; }
            } else {
                currentSortColumn = columnName;
                currentSortDirection = 'asc';
            }
            applyFilters();
        }
        
        function renderTable(dataToRender) {
            const tableContainer = document.querySelector('.table-container');
            tableContainer.innerHTML = '';
            const table = document.createElement('table');
            table.className = 'data-table';
            
            const thead = table.createTHead();
            const headerRow = thead.insertRow();
            currentHeaders.forEach(header => {
                if (visibleColumns[header]) {
                    const th = document.createElement('th');
                    th.className = 'sortable-header';
                    th.onclick = () => sortTable(header);
                    let sortIcon = 'fa-sort';
                    if (currentSortColumn === header && currentSortDirection) {
                        sortIcon = currentSortDirection === 'asc' ? 'fa-sort-up' : 'fa-sort-down';
                    }
                    th.innerHTML = `${header} <i class="fas ${sortIcon} sort-icon ${currentSortColumn === header ? 'active' : ''}"></i>`;
                    headerRow.appendChild(th);
                }
            });

            const tbody = table.createTBody();
            if (dataToRender.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell();
                cell.colSpan = Object.values(visibleColumns).filter(Boolean).length || 1;
                cell.textContent = '표시할 데이터가 없습니다.';
                cell.style.textAlign = 'center';
                cell.style.padding = '40px';
            } else {
                dataToRender.forEach((rowData, index) => {
                    const rowId = `row-${index}`;
                    const row = tbody.insertRow();
                    row.id = rowId;
                    row.onclick = (event) => { if (event.target.tagName !== 'A') toggleDetails(rowId, rowData); };
                    rowData.forEach((cellData, cellIndex) => {
                        const headerName = currentHeaders[cellIndex];
                        if (visibleColumns[headerName]) {
                            const cell = row.insertCell();
                            if (headerName === '구분') {
                                cell.textContent = index + 1;
                            } else if (headerName === '연락처' && cellData) {
                                cell.innerHTML = `<a href="tel:${cellData.replace(/\D/g, '')}" style="color: var(--sidebar-accent);">${cellData}</a>`;
                            } else {
                                cell.textContent = (headerName === '지원일' && cellData) ? new Date(cellData).toLocaleDateString() : (cellData || '');
                            }
                        }
                    });
                    const detailRow = tbody.insertRow();
                    detailRow.className = 'detail-row';
                    detailRow.id = `detail-${rowId}`;
                    const detailCell = detailRow.insertCell();
                    detailCell.colSpan = Object.values(visibleColumns).filter(Boolean).length;
                    detailCell.innerHTML = `<div class="detail-content"></div>`;
                });
            }
            tableContainer.appendChild(table);
        }

        function toggleDetails(rowId, rowData) {
            const detailRow = document.getElementById(`detail-${rowId}`);
            if (!detailRow) return;

            if (activeDetailRowId && activeDetailRowId !== rowId) {
                const prevDetailRow = document.getElementById(`detail-${activeDetailRowId}`);
                if (prevDetailRow) prevDetailRow.classList.remove('show');
            }
            
            detailRow.classList.toggle('show');
            
            if (detailRow.classList.contains('show')) {
                const detailContent = detailRow.querySelector('.detail-content');
                let detailHtml = '<table class="detail-table">';
                currentHeaders.forEach((header, index) => {
                    if (DEFAULT_HIDDEN_COLUMNS.includes(header)) {
                         detailHtml += `<tr><td><strong>${header}:</strong></td><td>${rowData[index] || '-'}</td></tr>`;
                    }
                });
                detailHtml += '</table>';
                detailContent.innerHTML = detailHtml;
                activeDetailRowId = rowId;
            } else {
                activeDetailRowId = null;
            }
        }

        function handleDateFilterChange(isReset = false) {
            const type = document.getElementById('dateFilterType').value;
            const container = document.getElementById('dateInputsContainer');
            container.innerHTML = ''; 
            let html = '';
            
            if (type === 'year') {
                html = `<div class="filter-group"><input type="number" id="yearInput" placeholder="YYYY" oninput="applyFilters()"></div>`;
            } else if (type === 'month') {
                html = `<div class="filter-group"><input type="month" id="monthInput" onchange="applyFilters()"></div>`;
            } else if (type === 'day') {
                html = `<div class="filter-group"><input type="date" id="dayInput" onchange="applyFilters()"></div>`;
            } else if (type === 'range') {
                html = `<div class="filter-group"><input type="date" id="startDateInput" onchange="applyFilters()"></div> <span style="align-self: center; margin: 0 5px;">-</span> <div class="filter-group"><input type="date" id="endDateInput" onchange="applyFilters()"></div>`;
            }
            container.innerHTML = html;
            
            // Set default value for the new input
            if(isReset || type === 'month') {
                const now = new Date();
                const year = now.getFullYear();
                const month = (now.getMonth() + 1).toString().padStart(2, '0');
                if(document.getElementById('monthInput')) {
                    document.getElementById('monthInput').value = `${year}-${month}`;
                }
            } else if (type === 'year') {
                if(document.getElementById('yearInput')) {
                   document.getElementById('yearInput').value = new Date().getFullYear();
                }
            }

            if (type === 'all') applyFilters();
        }
        
        function toggleColumnDropdown() {
            const dropdown = document.getElementById('columnToggleDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        function handleColumnToggle(event, columnName) {
            visibleColumns[columnName] = event.target.checked;
            applyFilters();
        }

        function setupColumnToggles() {
            const container = document.getElementById('columnToggleDropdown');
            container.innerHTML = '';
            Object.keys(visibleColumns).forEach(columnName => {
                const item = document.createElement('div');
                item.className = 'column-toggle-item';
                item.innerHTML = `<input type="checkbox" id="col-${columnName}" onchange="handleColumnToggle(event, '${columnName}')" ${visibleColumns[columnName] ? 'checked' : ''}><label for="col-${columnName}">${columnName}</label>`;
                container.appendChild(item);
            });
        }
        
        function generateVisibleColumns(headers) {
            visibleColumns = {};
            headers.forEach(header => {
                if (header) visibleColumns[header] = !DEFAULT_HIDDEN_COLUMNS.includes(header);
            });
        }

        function buildModalForm() {
            const form = document.getElementById('applicantForm');
            form.innerHTML = '';
            currentHeaders.forEach(header => {
                if (!header) return;
                const id = `modal-form-${header}`;
                const formGroup = document.createElement('div');
                formGroup.className = 'form-group';
                let inputHtml;
                const required = (header === '이름' || header === '지원일');

                if (header === '구분') {
                    inputHtml = `<input type="text" id="${id}" value="${nextSequenceNumber}">`;
                } else if (header === '모집분야') {
                    inputHtml = `<select id="${id}"><option value="영업">영업</option><option value="강사">강사</option></select>`;
                } else if (header === '지원루트') {
                    const routes = ['사람인', '잡코리아', '인크루트', 'Instagram', 'Threads', '배우공고'];
                    const options = routes.map(r => `<option value="${r}">${r}</option>`).join('');
                    inputHtml = `<select id="${id}"><option value=""></option>${options}</select>`;
                } else if (header === '연락처') {
                    inputHtml = `<input type="tel" id="${id}" placeholder="010-0000-0000" oninput="formatPhoneNumber(this)">`;
                } else if (header === '지원일') {
                    inputHtml = `<input type="date" id="${id}" ${required ? 'required' : ''}>`;
                } else if (header === '성별') {
                    inputHtml = `<select id="${id}"><option value=""></option><option value="남">남</option><option value="여">여</option></select>`;
                } else if (header === '비고') {
                    inputHtml = `<textarea id="${id}" rows="3"></textarea>`;
                } else {
                    inputHtml = `<input type="text" id="${id}" ${required ? 'required' : ''}>`;
                }
                
                formGroup.innerHTML = `<label for="${id}">${header}${required ? ' *' : ''}</label>${inputHtml}`;
                if (header === '비고' || header === '구분') formGroup.classList.add('full-width');
                form.appendChild(formGroup);
            });
        }

        function formatPhoneNumber(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 7) {
                input.value = `${value.slice(0, 3)}-${value.slice(3, 7)}-${value.slice(7)}`;
            } else if (value.length > 3) {
                input.value = `${value.slice(0, 3)}-${value.slice(3)}`;
            } else {
                input.value = value;
            }
        }
    </script>
</body>
</html>
